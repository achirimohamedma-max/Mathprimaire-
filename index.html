<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رياضياتي - الثالث ابتدائي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:#F0F4FF;
}

/* ✅ حل مشكل العرض الصغير */
.app{
  width:100%;
  max-width:100%;
  margin:auto;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#FF6B35,#FF8F65);
  color:#fff;
  padding:20px;
  border-radius:0 0 30px 30px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
}

.avatar{
  width:60px;height:60px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.level{
  background:gold;
  padding:2px 8px;
  border-radius:20px;
  font-size:12px;
}

.points{
  margin-top:15px;
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:15px;
}

.bar{
  height:8px;
  background:#0002;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:60%;
  background:gold;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  padding:15px;
}

.card{
  flex:1;
  background:#fff;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.card b{font-size:20px}

/* SERIES */
.section{
  padding:15px;
}

.series{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-bottom:10px;
}

.btn{
  margin-top:10px;
  background:#FF6B35;
  color:#fff;
  padding:10px;
  border:none;
  border-radius:10px;
  width:100%;
  font-weight:bold;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

  <div class="top">
    <div>🔢 رياضياتي</div>
    <div>🔔</div>
  </div>

  <div class="profile">
    <div class="avatar">🧒</div>
    <div>
      <div>مرحبا 👋</div>
      <b>أحمد</b><br>
      🔥 سلسلة 7 أيام
    </div>
    <div class="level">Lv.5</div>
  </div>

  <div class="points">
    ⭐ نقاطك: <b>1240</b>
    <div class="bar"><div class="fill"></div></div>
    <small>240 / 500 للوصول للمستوى 6</small>
  </div>

</div>

<div class="stats">
  <div class="card">✅<br><b>12</b><br>تمرين</div>
  <div class="card">🎯<br><b>85%</b><br>نجاح</div>
  <div class="card">🏅<br><b>4</b><br>شارات</div>
</div>

<div class="section">
  <h3>سلاسل التمارين</h3>

  <div class="series">
    ضرب الأعداد<br>
    ⏱ 10 دقائق • 15 تمرين
    <button class="btn">ابدأ</button>
  </div>

  <div class="series">
    القسمة<br>
    ⏱ 12 دقيقة • 18 تمرين
    <button class="btn">أكمل</button>
  </div>

</div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>📚</div>
  <div>▶️</div>
  <div>🏅</div>
  <div>👤</div>
</div>

</body>
</html>
